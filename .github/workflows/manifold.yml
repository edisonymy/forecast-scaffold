name: Manifold bot

on:
  # Hourly per the operator's 2026-07-12 amendment. Minute 17 avoids the top-of-hour cron
  # surge. GitHub cron is best-effort; a dropped tick is skipped rather than replayed because
  # replaying it could violate the one-$5-budget-window-per-scheduled-run contract.
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never kill an in-flight forecasting/betting run

jobs:
  manifold:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write # commits the public journal + phase file
      issues: write # the betting-disabled alert below files one deduped issue
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        # Same pinned CLI as bot.yml: an unattended cron must not pick up a broken or
        # compromised release mid-flight. Bump deliberately, then watch one run.
        run: |
          pip install -e .
          npm install -g @anthropic-ai/claude-code@2.1.201

      - name: Run Manifold bot
        # This path is Claude-subscription-only. The explicit setup-token is required and
        # run_manifold rejects metered/gateway auth before doing any repo or network work.
        # Its cumulative $5 accounting is backed by Claude's native --max-budget-usd on each
        # subprocess, set to exactly the unspent remainder. Unknown usage reserves the entire
        # remainder and fails the step closed.
        #
        # Require the Manifold key before model spend: a missing live credential must not burn
        # an hourly credit window on forecasts that can only be dry-run. Betting remains gated
        # by the phase machine, balance floor, exposure cap, position guard, and killed state.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          MANIFOLD_API_KEY: ${{ secrets.MANIFOLD_API_KEY }}
          LEAK_PATTERNS: ${{ secrets.LEAK_PATTERNS }}
        run: |
          set -o pipefail
          : "${CLAUDE_CODE_OAUTH_TOKEN:?set the subscription setup-token secret}"
          : "${MANIFOLD_API_KEY:?set the live Manifold credential secret}"
          : "${LEAK_PATTERNS:?set the publication deny-list secret}"
          python bot/run_manifold.py --limit 10 --tier medium --live --provider subscription \
            --budget 5 --deadline-minutes 45 --timeout 900 --require-subscription-auth \
            | tee "$RUNNER_TEMP/manifold.log"

      - name: Manifold run summary
        # Mirrors bot.yml's digest step: the load-bearing stdout lines (phase transitions,
        # recorded pairs, bets, skips, the informed-read/exposure/floor markers) in the job
        # summary. always() + trailing `|| true` (grep exits 1 on zero matches, e.g. a missing
        # log) mean this never fails the job.
        if: always()
        run: |
          {
            echo "### Manifold bot digest"
            echo
            echo '```'
            grep -hiE "phase|recorded|journaled pair|BET |DRY-RUN would bet|market_read|exposure|floor|skip|CONVERGENCE|selected|credit|SUBSCRIPTION-DEFER|session limit" \
              "$RUNNER_TEMP/manifold.log" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on betting disabled (one open issue, never daily spam)
        # A --live run that degrades to forecast-only (invalid key, balance-read failure,
        # balance below the phase-1 floor) exits GREEN and keeps burning agent spend daily
        # with no bets possible. run_manifold.py prints a "BETTING-DISABLED: <reason>"
        # stdout line on exactly those illegitimate paths — never on a legitimate zero-bet
        # run (convergence exits, informed reads) — so grep ONLY for the marker, never for
        # bet counts. Dedupe mirrors bot.yml's alert step: while the issue stays open,
        # nothing new is filed.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -f "$RUNNER_TEMP/manifold.log" ] || exit 0
          markers=$(grep -E "^BETTING-DISABLED:" "$RUNNER_TEMP/manifold.log" || true)
          [ -n "$markers" ] || exit 0
          title="Manifold bot: betting disabled while live"
          existing=$(gh issue list --state open --search "in:title \"$title\"" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then echo "alert issue #$existing already open"; exit 0; fi
          {
            echo "Automated alert from the hourly Manifold workflow: a --live run degraded to"
            echo "forecast-only — forecasts continue (and cost money) but no bets can be placed."
            echo
            echo '```'
            echo "$markers"
            echo '```'
            echo
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "Close this issue once resolved — the next degraded run will open a fresh one."
          } > "$RUNNER_TEMP/alert-body.md"
          gh issue create --title "$title" --body-file "$RUNNER_TEMP/alert-body.md"

      - name: Commit journal + phase (pre-registration)
        # always(): journaled pairs and any phase promotion must be committed even if a later
        # market errored or the run timed out — the journal + phase file are the public record.
        if: always()
        env:
          LEAK_PATTERNS: ${{ secrets.LEAK_PATTERNS }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          MANIFOLD_API_KEY: ${{ secrets.MANIFOLD_API_KEY }}
        run: |
          # Leak-guard the machine-generated files BEFORE publishing. The bot ingests untrusted
          # market text and agent output; a personal-data match must block the push, not fail a
          # later CI run after the content is already public. Fail closed: require the deny-list.
          : "${LEAK_PATTERNS:?set the LEAK_PATTERNS secret before the bot can publish}"
          FILES="bot/journal/manifold.jsonl bot/journal/manifold-phase.json"
          # Scan (and commit) only files that exist: a zero-market first run can leave the
          # journal uncreated, and a missing path must not fail the scan or git add.
          EXISTING=""
          for f in $FILES; do if [ -f "$f" ]; then EXISTING="$EXISTING $f"; fi; done
          if [ -z "$EXISTING" ]; then echo "no journal/phase files yet — nothing to publish"; exit 0; fi
          # Scan only the lines THIS run adds. The content-free scanner applies the private
          # deny-list to every field, with one narrow workaround for the exact pound sign in
          # public question/contract fields; model-authored content remains fail-closed.
          git add -- $EXISTING
          set +e; python scripts/journal_leak_guard.py $EXISTING; status=$?; set -e
          if [ "$status" -ne 0 ]; then git reset -q; exit "$status"; fi
          # A prompt-injected agent's visible output lands in exactly these files — scan for the
          # credential VALUES themselves, fail-closed.
          for secret in "$CLAUDE_CODE_OAUTH_TOKEN" "$MANIFOLD_API_KEY"; do
            if [ -n "$secret" ] && grep -rqF -- "$secret" $EXISTING 2>/dev/null; then
              echo "::error::a credential value appears in the journal — not publishing"; exit 3
            fi
          done
          git config user.name "forecast-scaffold-bot"
          git config user.email "bot@users.noreply.github.com"
          git add $EXISTING
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "manifold: journal + phase update $(date -u +%FT%TZ)"
          # Rebase-and-retry: a concurrent tournament-bot commit must not lose a journaled
          # pair. The tree is clean after the commit, so autostash is both unnecessary and
          # forbidden by the repository's feature-work safety rule.
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 3
          done
          exit 1
