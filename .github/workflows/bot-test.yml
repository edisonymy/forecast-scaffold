name: Bot dry run / testing area

on:
  workflow_dispatch:
    inputs:
      tournament:
        description: "Tournament id or slug (use the bot-testing-area sandbox first)"
        required: true
      dry_run:
        description: "Dry run (record only, never submit)"
        type: boolean
        default: true
      limit:
        description: "Max questions this run"
        default: "3"
      blind:
        description: "Blind mode (hide the community prediction from the agent)"
        type: boolean
        default: false
      provider:
        description: "LLM billing path"
        type: choice
        options: [subscription, openrouter]
        default: subscription

permissions:
  contents: read # dry-run / testing-area runs never commit; the journal is shown in logs only

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: |
          pip install -e .
          npm install -g @anthropic-ai/claude-code

      - name: Run
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          # Subscription OAuth by default. Do NOT add ANTHROPIC_API_KEY: it takes precedence
          # and silently switches to per-token API billing. With provider=openrouter the bot
          # maps OPENROUTER_API_KEY into the CLI's env itself.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # via env, never interpolated into the shell line (script-injection safe)
          INPUT_TOURNAMENT: ${{ inputs.tournament }}
          INPUT_LIMIT: ${{ inputs.limit }}
          INPUT_PROVIDER: ${{ inputs.provider }}
        run: |
          python bot/run_bot.py --tournament "$INPUT_TOURNAMENT" \
            --limit "$INPUT_LIMIT" \
            --provider "${INPUT_PROVIDER:-subscription}" \
            ${{ inputs.dry_run && '--dry-run' || '' }} \
            ${{ inputs.blind && '--blind' || '' }} \
            --agent-cmd "claude -p --model claude-sonnet-5 --output-format json --allowed-tools Read,Glob,Grep,WebSearch,WebFetch"

      - name: Show journal
        run: cat bot/journal/forecasts.jsonl || true
