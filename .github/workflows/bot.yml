name: Tournament bot

on:
  # No cron while testing on the sandbox: the bot runs ONLY when triggered by hand
  # (the "Run workflow" button, or `gh workflow run bot.yml`). This spends no SDK credit
  # until you ask it to. When you enter a REAL tournament, uncomment the schedule below to
  # forecast at most once a day (tighten only if early forecasts materially help peer score):
  # schedule:
  #   - cron: "7 6 * * *" # 06:07 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never kill an in-flight forecasting run

jobs:
  forecast:
    if: ${{ vars.TOURNAMENT_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 110
    permissions:
      contents: write # commits the public journal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: |
          pip install -e .
          npm install -g @anthropic-ai/claude-code

      - name: Run bot
        # Auth: set ONE of the two secrets — CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token`,
        # draws on a Claude subscription's Agent SDK credit) or ANTHROPIC_API_KEY (pay-per-token).
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # via env, never interpolated into the shell line (script-injection safe)
          TOURNAMENT_ID: ${{ vars.TOURNAMENT_ID }}
        run: |
          python bot/run_bot.py --tournament "$TOURNAMENT_ID" \
            --limit 10 \
            --agent-cmd "claude -p --model claude-sonnet-5 --output-format json --allowed-tools Read,Glob,Grep,WebSearch,WebFetch" --comment

      - name: Commit journal (pre-registration)
        # always(): submitted forecasts must be committed even when a later question errored
        # or the run timed out — the journal commits even when forecasts look bad.
        if: always()
        env:
          LEAK_PATTERNS: ${{ secrets.LEAK_PATTERNS }}
        run: |
          # Leak-guard the machine-generated journal BEFORE publishing it. The bot ingests
          # untrusted question text; a personal-data match must block the push, not just fail
          # a later CI run after the content is already public.
          PATTERNS="${LEAK_PATTERNS:-£|net.?worth|users.Edison.Yi}"
          set +e; grep -rniIE "$PATTERNS" bot/journal/; status=$?; set -e
          if [ "$status" -eq 0 ]; then echo "::error::personal-data in journal — not publishing"; exit 1; fi
          if [ "$status" -ne 1 ]; then echo "::error::leak-guard grep failed ($status)"; exit 2; fi
          git config user.name "forecast-scaffold-bot"
          git config user.email "bot@users.noreply.github.com"
          git add bot/journal/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "bot: journal update $(date -u +%FT%TZ)"
          # rebase-and-retry: a concurrent commit must not lose a submitted forecast's journal line
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            sleep 3
          done
          exit 1
