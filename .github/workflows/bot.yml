name: Tournament bot

on:
  schedule:
    - cron: "7 */6 * * *" # every 6h (sandbox cadence). For a live tournament with rolling
    # question drops, tighten this (e.g. "7,27,47 * * * *") to forecast early for peer score.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never kill an in-flight forecasting run

jobs:
  forecast:
    if: ${{ vars.TOURNAMENT_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 110
    permissions:
      contents: write # commits the public journal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: |
          pip install -e .
          npm install -g @anthropic-ai/claude-code

      - name: Run bot
        # Auth: set ONE of the two secrets — CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token`,
        # draws on a Claude subscription's Agent SDK credit) or ANTHROPIC_API_KEY (pay-per-token).
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python bot/run_bot.py --tournament "${{ vars.TOURNAMENT_ID }}" \
            --limit 10 \
            --agent-cmd "claude -p --dangerously-skip-permissions" --comment

      - name: Commit journal (pre-registration)
        # always(): submitted forecasts must be committed even when a later question errored
        # or the run timed out — the journal commits even when forecasts look bad.
        if: always()
        run: |
          git config user.name "forecast-scaffold-bot"
          git config user.email "bot@users.noreply.github.com"
          git add bot/journal/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "bot: journal update $(date -u +%FT%TZ)"
          # rebase-and-retry: a concurrent commit must not lose a submitted forecast's journal line
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            sleep 3
          done
          exit 1
