# forecast-scaffold configuration template.
#
# Everything that churns — model preferences, draw counts, clamps, blend weights — lives
# here, never in the skills' markdown. Copy this file next to your journal (or point
# $FORECAST_CONFIG at it) and edit freely; missing keys fall back to built-in defaults.
# This template mirrors core.DEFAULTS exactly (a test asserts it).

[clamp]
# Final probabilities outside this band trigger a warning and are clamped by `aggregate`.
# 38% of tournament-winning bots clamp to roughly this band. Override deliberately when
# evidence is genuinely overwhelming and documented.
min = 0.02
max = 0.98

# draws      = in-context estimates within one run (works on every surface, but they are
#              CORRELATED — they see each other — and headless agents under-execute them).
# runs       = independent runs a harness (bot/bench/subagents) launches and pools with
#              geo_mean_odds. The deterministic effort lever; unavailable in a plain chat,
#              where the skill falls back to in-context draws and says so.
# run_models = optional model ids the harness cycles through for runs after the first —
#              cross-model diversity is the strongest documented ensemble lever (tournament
#              winners average ~1.8 model families; same-model trios underperform diverse
#              ones). Empty = every run uses the command's model. Binary questions only for
#              now: MC/numeric stay single-run until a pooling rule is preregistered.
# Run counts keep pooled n >= 4: geo_mean_odds only drops extremes at n >= 4, and each
# tier's reasoning runs then include a full counter-biasing lens pair.
[tiers.low]
draws = 1
searches = 1
runs = 1
run_models = []

[tiers.medium]
draws = 5
searches = 5
runs = 4
run_models = []

[tiers.high]
draws = 12
searches = 12
runs = 6
run_models = []

[blend]
# Weight on the crowd/market number when one exists. A simple 50/50 average beat both the
# system and the crowd alone in the published evidence.
crowd_weight = 0.5

[aggregation]
# "trimmed_mean" for correlated draws from one forecaster (the default);
# "geo_mean_odds" for genuinely independent forecasters/agents; "median" as a robust fallback.
method = "trimmed_mean"

[journal]
path = "forecasts.jsonl"

[models]
# Hints for the host agent — the scaffold never calls models itself. Model choice dominates
# scaffolding, so revisit these regularly; leave triage empty to let the host agent decide.
triage = ""
notes = "model choice dominates scaffolding; keep this fresh"
