name: Benchmark on a ForecastBench drop

on:
  workflow_dispatch:
    inputs:
      date:
        description: "ForecastBench set date (YYYY-MM-DD) or 'latest'"
        default: "latest"
      n:
        description: "Questions to sample (each costs ~runs-per-tier agent calls)"
        default: "30"
      tiers:
        description: "Tiers to run (comma-separated; auto = router-only)"
        default: "low,high,auto"
  # Unattended cadence deliberately OFF: enabling this spends subscription credit without
  # a human in the loop. When wanted, uncomment (drops land roughly biweekly; the job is
  # idempotent per set, so a daily check only does real work when a new drop appears):
  # schedule:
  #   - cron: "17 2 * * *" # 02:17 UTC daily — outside Edison's usual usage window

permissions:
  contents: read # results go to the job summary + workflow artifact, never a commit

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: |
          pip install -e .
          npm install -g @anthropic-ai/claude-code@2.1.201

      - name: Build question set (live-crowd + verbatim-contract hygiene)
        env:
          # Read-only: used to pull Metaculus questions' criteria + fine print verbatim.
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          INPUT_DATE: ${{ inputs.date }}
          INPUT_N: ${{ inputs.n }}
        run: |
          python bench/fetch_set.py --date "${INPUT_DATE:-latest}" --n "${INPUT_N:-30}" \
            --refresh-crowd --out bench/sets/ci-run.jsonl

      - name: Run tiers (paired, blind, subscription)
        env:
          # Subscription OAuth only — never a metered key here.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          INPUT_TIERS: ${{ inputs.tiers }}
        run: |
          python bench/run_bench.py bench/sets/ci-run.jsonl \
            --tiers "${INPUT_TIERS:-low,high,auto}" --provider subscription --concurrency 6 \
            --agent-cmd "claude -p --model claude-sonnet-5 --output-format json --allowed-tools Read,Glob,Grep,WebSearch,WebFetch"

      - name: Report
        if: always()
        run: |
          python bench/report.py bench/sets/ci-run.jsonl || true
          cat bench/results/ci-run.report.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench/sets/ci-run.jsonl
            bench/results/ci-run.results.jsonl
            bench/results/ci-run.report.md
