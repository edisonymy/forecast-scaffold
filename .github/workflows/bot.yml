name: Tournament bot

on:
  # FutureEval runs on fast "spot" questions that open in weekday waves and close within
  # hours — an hourly drip catches them; a daily batch would miss most. Spend is bounded
  # twice over: --budget caps each invocation's notional cost, and question volume
  # (~3-6/day) caps the realistic daily total far below the cron's theoretical maximum.
  schedule:
    - cron: "17 * * * *" # hourly; no-op (pennies) when nothing new is open
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM billing path"
        type: choice
        options: [subscription, openrouter]
        default: subscription

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never kill an in-flight forecasting run

jobs:
  forecast:
    if: ${{ vars.TOURNAMENT_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 110
    permissions:
      contents: write # commits the public journal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: |
          pip install -e .
          npm install -g @anthropic-ai/claude-code

      - name: Run bot (subscription)
        # Auth: CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token`) draws on the Claude
        # subscription. We deliberately do NOT set ANTHROPIC_API_KEY: if present it takes
        # precedence and silently bills the API per-token instead. On failure (auth outage,
        # rate limit, flaky questions) the OpenRouter step below reruns the remainder —
        # already-forecasted questions are skipped, so nothing is double-submitted.
        id: primary
        if: ${{ inputs.provider != 'openrouter' }}
        continue-on-error: true
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # via env, never interpolated into the shell line (script-injection safe)
          TOURNAMENT_ID: ${{ vars.TOURNAMENT_ID }}
        run: |
          python bot/run_bot.py --tournament "$TOURNAMENT_ID" \
            --limit 20 --budget 3 --deadline-minutes 85 --provider subscription \
            --agent-cmd "claude -p --model claude-sonnet-5 --output-format json --allowed-tools Read,Glob,Grep,WebSearch,WebFetch" --comment

      - name: Run bot (OpenRouter — selected or fallback)
        # Runs when chosen explicitly, or as the backup after a subscription failure.
        # Billed to OpenRouter credits; the same claude CLI is pointed at OpenRouter's
        # Anthropic-compatible endpoint and the model id becomes anthropic/<id>.
        if: ${{ inputs.provider == 'openrouter' || steps.primary.outcome == 'failure' }}
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOURNAMENT_ID: ${{ vars.TOURNAMENT_ID }}
        run: |
          : "${OPENROUTER_API_KEY:?set the OPENROUTER_API_KEY secret to use the OpenRouter path}"
          python bot/run_bot.py --tournament "$TOURNAMENT_ID" \
            --limit 20 --budget 3 --deadline-minutes 85 --provider openrouter \
            --agent-cmd "claude -p --model claude-sonnet-5 --output-format json --allowed-tools Read,Glob,Grep,WebSearch,WebFetch" --comment

      - name: Commit journal (pre-registration)
        # always(): submitted forecasts must be committed even when a later question errored
        # or the run timed out — the journal commits even when forecasts look bad.
        if: always()
        env:
          LEAK_PATTERNS: ${{ secrets.LEAK_PATTERNS }}
        run: |
          # Leak-guard the machine-generated journal BEFORE publishing it. The bot ingests
          # untrusted question text; a personal-data match must block the push, not just fail
          # a later CI run after the content is already public.
          # Require the deny-list (fail-closed): never publish an unscanned journal, and keep
          # the literal pattern out of this file so the ci.yml guard does not match it.
          : "${LEAK_PATTERNS:?set the LEAK_PATTERNS secret before the bot can publish}"
          set +e; grep -rniIE "$LEAK_PATTERNS" bot/journal/; status=$?; set -e
          if [ "$status" -eq 0 ]; then echo "::error::personal-data in journal — not publishing"; exit 1; fi
          if [ "$status" -ne 1 ]; then echo "::error::leak-guard grep failed ($status)"; exit 2; fi
          git config user.name "forecast-scaffold-bot"
          git config user.email "bot@users.noreply.github.com"
          git add bot/journal/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "bot: journal update $(date -u +%FT%TZ)"
          # rebase-and-retry: a concurrent commit must not lose a submitted forecast's journal line
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            sleep 3
          done
          exit 1

      - name: Preserve journal on publish failure
        # A leak-guard match or push failure must block PUBLICATION, not destroy the
        # evidence: a submitted forecast with no journal line anywhere would be a hole in
        # the public preregistration trail. The artifact keeps the journal private for
        # manual review instead of losing it with the runner.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unpublished-journal-${{ github.run_id }}
          path: bot/journal/
          retention-days: 30
